name: Examples Under Stress
permissions:
    contents: read

on:
    workflow_dispatch:
        inputs:
            ref:
                description: 'Branch/commit/PR to test (e.g. your-branch-name, main, or refs/pull/123/head). Leave empty to use default branch.'
                default: ''
            network:
                description: 'Localnet version'
                type: choice
                options: [devnet, mainnet]
                default: devnet
            parties_per_interval:
                description: 'PARTIES_PER_INTERVAL'
                default: '3'
            interval_length_ms:
                description: 'INTERVAL_LENGTH_MS'
                default: '7500'
            transfers_per_party:
                description: 'TRANSFERS_PER_PARTY'
                default: '5'
            stress_log_level:
                description: 'BACKGROUND_STRESS_LOG_LEVEL'
                default: 'silent'
            script_name:
                description: 'Run only a single script (full name match, e.g. "06-multi-hosted-party"). Leave empty to run all scripts.'
                default: ''

jobs:
    version-config:
        runs-on: ubuntu-latest
        outputs:
            daml_release_version: ${{ steps.version.outputs.daml_release_version }}
            devnet_canton_version: ${{ steps.version.outputs.devnet_canton_version }}
            mainnet_canton_version: ${{ steps.version.outputs.mainnet_canton_version }}
            devnet_splice_version: ${{ steps.version.outputs.devnet_splice_version }}
            mainnet_splice_version: ${{ steps.version.outputs.mainnet_splice_version }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.inputs.ref || github.ref }}

            - name: Resolve version config outputs
              id: version
              shell: bash
              run: |
                  CONFIG=$(cat scripts/src/lib/version-config.json)
                  echo "daml_release_version=$(echo "$CONFIG" | jq -r '.DAML_RELEASE_VERSION' | tr -d '\r\n')" >> "$GITHUB_OUTPUT"
                  echo "devnet_canton_version=$(echo "$CONFIG" | jq -r '.SUPPORTED_VERSIONS.devnet.canton.version')" >> "$GITHUB_OUTPUT"
                  echo "mainnet_canton_version=$(echo "$CONFIG" | jq -r '.SUPPORTED_VERSIONS.mainnet.canton.version')" >> "$GITHUB_OUTPUT"
                  echo "devnet_splice_version=$(echo "$CONFIG" | jq -r '.SUPPORTED_VERSIONS.devnet.splice.version')" >> "$GITHUB_OUTPUT"
                  echo "mainnet_splice_version=$(echo "$CONFIG" | jq -r '.SUPPORTED_VERSIONS.mainnet.splice.version')" >> "$GITHUB_OUTPUT"

    stress-e2e:
        runs-on: ubuntu-latest
        timeout-minutes: 120
        needs: [version-config]

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.inputs.ref || github.ref }}

            - uses: ./.github/actions/setup_yarn/initial
              with:
                  daml_release_version: ${{ needs.version-config.outputs.daml_release_version }}

            - uses: ./.github/actions/setup_localnet/initial
              with:
                  network: ${{ github.event.inputs.network || 'devnet' }}
                  splice_version: ${{ (github.event.inputs.network || 'devnet') == 'devnet' && needs.version-config.outputs.devnet_splice_version || needs.version-config.outputs.mainnet_splice_version }}

            - uses: ./.github/actions/check_resources

            - name: Run example scripts under background stress
              env:
                  MAX_IO_LISTENERS: '50'
                  PARTIES_PER_INTERVAL: ${{ github.event.inputs.parties_per_interval || '3' }}
                  INTERVAL_LENGTH_MS: ${{ github.event.inputs.interval_length_ms || '7500' }}
                  TRANSFERS_PER_PARTY: ${{ github.event.inputs.transfers_per_party || '5' }}
                  BACKGROUND_STRESS_LOG_LEVEL: ${{ github.event.inputs.stress_log_level || 'silent' }}
                  SCRIPT_NAME: ${{ github.event.inputs.script_name || '' }}
              run: yarn script:test:examples-stress

            - uses: ./.github/actions/check_resources

            - name: Stop localnet (${{ github.event.inputs.network || 'devnet' }})
              if: always()
              run: yarn stop:localnet -- --network=${{ github.event.inputs.network || 'devnet' }}

            - name: Save container logs (on failure)
              if: failure()
              run: |
                  set -euo pipefail
                  mkdir -p logs
                  for c in $(docker ps -a --format '{{.Names}}'); do
                    docker logs "$c" &> "logs/$c.log" || true
                  done

            - name: Upload logs as artifacts
              if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: docker-logs-${{ github.event.inputs.network || 'devnet' }}
                  path: logs/
