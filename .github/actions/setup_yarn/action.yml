name: Setup Yarn
description: 'Setup Yarn for the project'
runs:
    using: composite
    steps:
        - name: Enable Corepack
          shell: bash
          run: corepack enable

        - name: Setup Node.js
          uses: actions/setup-node@v6
          with:
              node-version: 'v24.9.0'
              cache: 'yarn'

        - name: Resolve DAML release version
          id: daml_release_version
          shell: bash
          run: |
              VERSION=$(jq -r '.DAML_RELEASE_VERSION' scripts/src/lib/version-config.json)
              echo "value=$VERSION" >> "$GITHUB_OUTPUT"

        - name: Restore DPM cache
          id: dpm_cache
          uses: actions/cache/restore@v5
          with:
              path: |
                  ~/.dpm
                  ~/.cache/daml
              key: dpm-${{ runner.os }}-${{ steps.daml_release_version.outputs.value }}

        - name: Add DPM to PATH
          shell: bash
          run: echo "$HOME/.dpm/bin" >> "$GITHUB_PATH"

        - name: Install dependencies
          shell: bash
          run: yarn install --immutable

        - name: Save DPM cache
          if: ${{ steps.dpm_cache.outputs.cache-hit != 'true' }}
          uses: actions/cache/save@v5
          with:
              path: |
                  ~/.dpm
                  ~/.cache/daml
              key: ${{ steps.dpm_cache.outputs.cache-primary-key }}


        - name: Download build artifacts
          id: download_build_artifacts
          continue-on-error: true
          uses: actions/download-artifact@v4
          with:
              name: build-dist-${{ github.run_id }}

        - name: Install dependencies
          shell: bash
          run: yarn install --immutable

        - name: generate all
          if: ${{ steps.download_build_artifacts.outcome == 'failure' || steps.download_build_artifacts.outputs.download-path == '' }}
          shell: bash
          run: yarn generate:all
