name: Setup Yarn (From Artifacts)
description: 'Setup Yarn for jobs that consume build artifacts from the same workflow run'
inputs:
    daml_release_version:
        description: 'Resolved DAML release version from workflow metadata job'
        required: true
runs:
    using: composite
    steps:
        - name: Enable Corepack
          shell: bash
          run: corepack enable

        - name: Setup Node.js
          uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
          with:
              node-version-file: .nvmrc
              cache: yarn

        - name: Download build artifacts
          uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
          with:
              name: build-dist-${{ github.run_id }}

        - name: Install dependencies
          shell: bash
          env:
              YARN_ENABLE_HARDENED_MODE: '0'
          run: yarn install --immutable
