name: Save cache if absent
description: Re-check cache key with lookup-only and save only when still missing
inputs:
    path:
        description: Cache path(s)
        required: true
    key:
        description: Cache key
        required: true
runs:
    using: composite
    steps:
        - name: Re-check cache before save
          id: cache-pre-save
          uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
          with:
              path: ${{ inputs.path }}
              key: ${{ inputs.key }}
              lookup-only: true

        - name: Save cache
          if: ${{ steps.cache-pre-save.outputs.cache-hit != 'true' }}
          uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
          with:
              path: ${{ inputs.path }}
              key: ${{ inputs.key }}
