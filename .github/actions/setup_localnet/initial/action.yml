name: 'Setup Localnet (Initial)'
description: 'Cache, download and optionally start Localnet environment for initial workflows'
inputs:
    network:
        description: 'Network type: devnet or mainnet'
        required: true
    splice_version:
        description: 'Splice version (required)'
        required: true
runs:
    using: 'composite'
    steps:
        - name: Cache Localnet files
          uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
          id: localnet-cache
          with:
              path: |
                  .localnet/docker-compose/localnet
                  .localnet/dars
                  /tmp/docker-images
              key: ${{ runner.os }}-localnet-${{ inputs.splice_version }}
              lookup-only: true

        - name: Download Localnet
          if: steps.localnet-cache.outputs.cache-hit != 'true'
          shell: bash
          run: yarn script:fetch:localnet --network=${{ inputs.network }}

        - name: Pull Localnet
          if: steps.localnet-cache.outputs.cache-hit != 'true'
          shell: bash
          run: yarn pull:localnet

        - name: Save Docker images to cache
          if: ${{ steps.localnet-cache.outputs.cache-hit != 'true' }}
          shell: bash
          run: |
              mkdir -p /tmp/docker-images
              LOCALNET_DIR=.localnet/docker-compose/localnet
              images=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep -v "<none>" || true)
              if [ -n "$images" ]; then
                echo "$images" | xargs -r docker save -o /tmp/docker-images/images.tar
              else
                echo "No Docker images found to save."
              fi

        - name: Save Localnet cache
          if: ${{ steps.localnet-cache.outputs.cache-hit != 'true' }}
          uses: ./.github/actions/save_cache_if_absent
          with:
              path: |
                  .localnet/docker-compose/localnet
                  .localnet/dars
                  /tmp/docker-images
              key: ${{ runner.os }}-localnet-${{ inputs.splice_version }}
